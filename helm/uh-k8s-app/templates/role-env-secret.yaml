{{- if and .Values.awsEnvSecret (hasKey .Values.awsEnvSecret "enabled") .Values.awsEnvSecret.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "demo-app.fullname" . }}-env-secret
  labels:
    {{- include "demo-app.labels" . | nindent 4 }}
rules:
  # create verb cannot use resourceNames, so it is a separate rule
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  # get/update/patch scoped to only the env secret
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["{{ include "demo-app.fullname" . }}-env"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "demo-app.fullname" . }}-env-secret
  labels:
    {{- include "demo-app.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "demo-app.fullname" . }}-env-secret
subjects:
  - kind: ServiceAccount
    name: {{ include "demo-app.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
